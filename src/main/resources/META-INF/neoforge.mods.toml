modLoader = "javafml"
loaderVersion = "[4,)"
license = "MIT"

[[mods]]
modId       = "${mod_id}"
version     = "${mod_version}"
displayName = "${mod_name}"
description = '''${mod_description}'''
authors     = "${mod_authors}"

[[dependencies.${mod_id}]]
    modId      = "neoforge"
    type       = "required"
    versionRange = "[${neoforge_version},)"
    ordering   = "NONE"
    side       = "BOTH"

[[dependencies.${mod_id}]]
    modId      = "minecraft"
    type       = "required"
    versionRange = "[${minecraft_version},)"
    ordering   = "NONE"
    side       = "BOTH"

# PowerGrid is required
[[dependencies.${mod_id}]]
    modId      = "powergrid"
    type       = "required"
    versionRange = "[0.5,)"
    ordering   = "AFTER"
    side       = "BOTH"

# Create is required (transitive through PowerGrid, but we state it explicitly)
[[dependencies.${mod_id}]]
    modId      = "create"
    type       = "required"
    versionRange = "[0.5,)"
    ordering   = "AFTER"
    side       = "BOTH"

# Shine is OPTIONAL
[[dependencies.${mod_id}]]
    modId      = "shine"
    type       = "optional"
    versionRange = "*"
    ordering   = "NONE"
    side       = "CLIENT"
    
