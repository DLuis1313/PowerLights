name: Build

on:
  push:
    branches: ["main", "dev"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Verificar libs/
        run: |
          echo "=== Conteúdo de libs/ ==="
          ls -lh libs/ || echo "PASTA VAZIA OU NAO EXISTE"

      - name: Install PowerGrid to Maven Local
        run: |
          mkdir -p ~/.m2/repository/org/patryk3211/powergrid/0.5.5.1
          cp libs/powergrid-mc1_21_1-0_5_5_1.jar \
             ~/.m2/repository/org/patryk3211/powergrid/0.5.5.1/powergrid-0.5.5.1.jar
          cat > ~/.m2/repository/org/patryk3211/powergrid/0.5.5.1/powergrid-0.5.5.1.pom << 'POM'
          <?xml version="1.0" encoding="UTF-8"?>
          <project>
            <modelVersion>4.0.0</modelVersion>
            <groupId>org.patryk3211</groupId>
            <artifactId>powergrid</artifactId>
            <version>0.5.5.1</version>
          </project>
          POM

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.8"

      - name: Build
        run: gradle build --no-daemon

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: powergridlights-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Install PowerGrid to Maven Local
        run: |
          mkdir -p ~/.m2/repository/org/patryk3211/powergrid/0.5.5.1
          cp libs/powergrid-mc1_21_1-0_5_5_1.jar \
             ~/.m2/repository/org/patryk3211/powergrid/0.5.5.1/powergrid-0.5.5.1.jar
          cat > ~/.m2/repository/org/patryk3211/powergrid/0.5.5.1/powergrid-0.5.5.1.pom << 'POM'
          <?xml version="1.0" encoding="UTF-8"?>
          <project>
            <modelVersion>4.0.0</modelVersion>
            <groupId>org.patryk3211</groupId>
            <artifactId>powergrid</artifactId>
            <version>0.5.5.1</version>
          </project>
          POM

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.8"

      - name: Build
        run: gradle build --no-daemon

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true
