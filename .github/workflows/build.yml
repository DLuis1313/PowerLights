plugins {
    id 'net.neoforged.moddev' version '2.0.80'
}

version = "${mod_version}"
group   = "${mod_group}"

base {
    archivesName = "${mod_id}-${minecraft_version}"
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(java_version as int)
}

neoForge {
    version = "${neoforge_version}"

    runs {
        client { client() }
        server { server(); programArgument '--nogui' }
    }

    mods {
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

repositories {
    maven {
        name = 'CreateMod'
        url  = 'https://maven.createmod.net'
    }
    maven {
        name = 'Ithundxr'
        url  = 'https://maven.ithundxr.dev/snapshots'
    }
}

def powergridJar = files('libs/powergrid-mc1_21_1-0_5_5_1.jar')

dependencies {
    compileOnly("com.simibubi.create:create-1.21.1:6.0.10-280:slim") {
        transitive = false
    }
    compileOnly "net.createmod.ponder:ponder-neoforge:1.0.82+mc1.21.1"
    compileOnly "dev.engine-room.flywheel:flywheel-neoforge-api-1.21.1:1.0.6"
    compileOnly "com.tterrag.registrate:Registrate:MC1.21-1.3.0+67"
}

// Adiciona o jar do PowerGrid DIRETAMENTE ao sourceset de compilação
// Esta é a forma mais garantida, independente do plugin NeoForge
sourceSets {
    main {
        compileClasspath += powergridJar
        runtimeClasspath += powergridJar
    }
}

processResources {
    def props = [
        mod_id           : mod_id,
        mod_name         : mod_name,
        mod_version      : mod_version,
        mod_description  : mod_description,
        mod_authors      : mod_authors,
        minecraft_version: minecraft_version,
        neoforge_version : neoforge_version,
    ]
    inputs.properties props
    filesMatching('META-INF/neoforge.mods.toml') { expand props }
}
